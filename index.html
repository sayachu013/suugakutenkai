<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>式の展開 因数分解：最終チェック対応版</title>
    <style>
        :root {
            --primary: #4a90e2; --secondary: #9b59b6; --success: #2ecc71;
            --error: #e74c3c; --gold: #f1c40f; --bg: #f5f7fa;
            --dark: #34495e; --review: #ff7675; --adv-color: #ff9f43;
            --test: #1abc9c;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; min-height: 600px; display: flex; flex-direction: column; }
        .screen { display: none; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }
        .home-title { text-align: center; color: var(--dark); margin-bottom: 25px; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .mode-btn { padding: 18px 10px; border: none; border-radius: 12px; cursor: pointer; color: white; transition: 0.3s; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .mode-btn h3 { margin: 0; font-size: 0.95rem; }
        .mode-btn p { margin: 5px 0 0; opacity: 0.9; font-size: 0.7rem; line-height: 1.2; }
        .btn-std { background: var(--primary); }
        .btn-adv { background: var(--adv-color); }
        .btn-factor { background: var(--secondary); }
        .btn-factor-adv { background: #555; }
        .btn-test { background: var(--test); grid-column: span 2; height: 70px; }
        .mode-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .review-section { margin-top: 15px; border-top: 2px dashed #ddd; padding-top: 15px; }
        .btn-review { background: var(--review); width: 100%; height: 50px; border-radius: 12px; color: white; border: none; cursor: pointer; font-weight: bold; display: none; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-home { background: #eee; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .combo-container { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        #combo-bar { width: 0%; height: 100%; background: var(--success); transition: width 0.3s; }
        .combo-text { font-weight: bold; color: var(--success); text-align: center; margin-top: 5px; font-size: 0.9rem; }
        .problem-card { background: #fff; border: 3px solid #f0f4f8; border-radius: 15px; padding: 40px 10px; text-align: center; margin-bottom: 20px; position: relative; min-height: 150px; display: flex; align-items: center; justify-content: center; }
        .mode-badge { position: absolute; top: 10px; left: 10px; padding: 2px 8px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; font-size: 0.7rem; color: #666; }
        .question { font-size: 1.3rem; font-weight: bold; line-height: 1.8; }
        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .choice-btn { padding: 12px 5px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; font-size: 0.85rem; cursor: pointer; transition: 0.15s; font-weight: bold; min-height: 85px; display: flex; align-items: center; justify-content: center; }
        .choice-btn.correct { background: var(--success) !important; color: white; }
        .choice-btn.wrong { background: var(--error) !important; color: white; }
        .math-text { font-family: "Times New Roman", Times, serif; font-style: italic; }
        sup { font-style: normal; font-size: 0.7em; vertical-align: super; }
        .frac { display: inline-flex; flex-direction: column; vertical-align: middle; text-align: center; font-size: 0.85em; margin: 0 2px; font-style: normal; }
        .frac .num { border-bottom: 1px solid currentColor; padding: 0 3px; line-height: 1.1; }
        .frac .den { padding: 0 3px; line-height: 1.1; }
        #clear-screen { text-align: center; padding-top: 30px; }
        .score-display { font-size: 4rem; font-weight: bold; color: var(--test); margin: 20px 0; }
        .eval-text { font-size: 1.2rem; font-weight: bold; color: var(--dark); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen" class="screen active">
        <div class="home-title"><h1>式の展開 因数分解</h1><p>計算問題 徹底演習</p></div>
        <div class="grid-menu">
            <button class="mode-btn btn-std" onclick="startGame('expand_std')"><h3>展開：標準</h3><p>基本3公式</p></button>
            <button class="mode-btn btn-adv" onclick="startGame('expand_adv')"><h3>展開：応用</h3><p>複合・置き換え</p></button>
            <button class="mode-btn btn-factor" onclick="startGame('factor_std')"><h3>因数分解：標準</h3><p>公式・共通因数</p></button>
            <button class="mode-btn btn-factor btn-factor-adv" onclick="startGame('factor_adv')"><h3>因数分解：応用</h3><p>4項・置き換え</p></button>
            <button class="mode-btn btn-test" onclick="startTest()"><h3>🏁 最終チェックテスト</h3><p>全範囲からランダムに20問出題！</p></button>
        </div>
        <div class="review-section"><button id="review-btn" class="btn-review" onclick="startGame('review_mode')">🔥 復習モード (<span id="review-count">0</span>問)</button></div>
    </div>

    <div id="game-screen" class="screen">
        <div class="top-nav"><button class="back-home" onclick="goHome()">◀ ホーム</button><div id="diff-label" style="font-size:0.7rem; font-weight:bold; color:#888;"></div></div>
        <div class="progress-area"><div class="combo-container"><div id="combo-bar"></div></div><div class="combo-text" id="combo-text">0 / 10</div></div>
        <div class="problem-card"><div id="mode-badge" class="mode-badge"></div><div id="question" class="question math-text"></div></div>
        <div id="choices" class="choices-grid"></div>
    </div>

    <div id="clear-screen" class="screen">
        <div id="clear-icon" style="font-size:3rem">🏆</div>
        <h2 id="clear-title">CLEAR!</h2>
        <div id="score-area" style="display:none;">
            <div class="score-display"><span id="final-score">0</span>点</div>
            <div id="eval-text" class="eval-text"></div>
        </div>
        <p id="clear-msg">お疲れ様でした！</p>
        <button class="mode-btn btn-std" onclick="goHome()" style="margin-top:20px; width:100%;">ホームへ戻る</button>
    </div>
</div>

<script>
    let combo = 0, goal = 10, currentAnswer = "", currentMode = "", reviewList = [], reviewIndex = 0;
    let isTestMode = false, testCount = 0, testCorrect = 0, testQueue = [];

    function formatMath(t) {
        if (!t) return "";
        return t.toString().replace(/\^2/g, '<sup>2</sup>')
            .replace(/\+1([a-z\(y])/g, '+$1').replace(/-1([a-z\(y])/g, '-$1')
            .replace(/\+0[a-z]/g, '').replace(/--/g, '+').replace(/\+-/g, '-')
            .replace(/^\+/, '').replace(/\(\+/, '(')
            .replace(/(\d+)\/(\d+)/g, '<span class="frac"><span class="num">$1</span><span class="den">$2</span></span>');
    }

    const rand = (min, max) => { let r = Math.floor(Math.random() * (max - min + 1)) + min; return r === 0 ? rand(min, max) : r; };

    function startGame(m) {
        isTestMode = false; currentMode = m; combo = 0; reviewIndex = 0; goal = 10;
        const labels = { 'expand_std': '展開：標準', 'expand_adv': '展開：応用', 'factor_std': '因数分解：標準', 'factor_adv': '因数分解：応用', 'review_mode': '🔥 復習' };
        document.getElementById('diff-label').innerText = labels[m];
        showScreen('game-screen'); updateUI(); generateProblem();
    }

    function startTest() {
        isTestMode = true; testCount = 0; testCorrect = 0; goal = 20;
        document.getElementById('diff-label').innerText = "🏁 最終チェックテスト";
        // 4カテゴリから5問ずつキューを作成
        testQueue = [];
        ['expand_std', 'expand_adv', 'factor_std', 'factor_adv'].forEach(m => {
            for(let i=0; i<5; i++) testQueue.push(m);
        });
        testQueue.sort(() => Math.random() - 0.5); // シャッフル
        showScreen('game-screen'); updateUI(); generateProblem();
    }

    function goHome() { showScreen('home-screen'); updateReviewButton(); }
    function showScreen(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }
    function updateReviewButton() {
        const btn = document.getElementById('review-btn');
        if (reviewList.length > 0) { btn.style.display = 'block'; document.getElementById('review-count').innerText = reviewList.length; } 
        else { btn.style.display = 'none'; }
    }

    function generateProblem() {
        if (isTestMode && testCount >= goal) { showTestResult(); return; }
        if (currentMode === 'review_mode' && reviewIndex >= reviewList.length) { showScreen('clear-screen'); return; }

        let modeToUse = isTestMode ? testQueue[testCount] : currentMode;
        let q, a, choices = [];
        let n1 = rand(-5, 5), n2 = rand(-5, 5);

        if (modeToUse === 'expand_std') {
            const sub = Math.floor(Math.random() * 3);
            if (sub === 0) { q = `(x${n1>0?'+':''}${n1})(x${n2>0?'+':''}${n2})`; a = `x^2${(n1+n2)>0?'+':''}${n1+n2}x${(n1*n2)>0?'+':''}${n1*n2}`; }
            else if (sub === 1) { q = `(x${n1>0?'+':''}${n1})^2`; a = `x^2${(n1*2)>0?'+':''}${n1*2}x+${n1*n1}`; }
            else { let num = Math.abs(n1); q = `(x+${num})(x-${num})`; a = `x^2-${num*num}`; }
            choices = [a, `x^2+${n1*n1}`, `x^2${(n1+n2)>0?'+':''}${n1+n2}x`, `(x+${n1})^2` ];
        } 
        else if (modeToUse === 'expand_adv') {
            if (Math.random() > 0.5) {
                q = `(x+y${n1>0?'+':''}${n1})(x+y${n2>0?'+':''}${n2})`;
                let s = n1+n2, p = n1*n2; a = `(x+y)^2${s>0?'+'+s:s}(x+y)${p>0?'+'+p:p}`;
                choices = [a, `(x+y)^2+${p}`, `x^2+y^2+${s}(x+y)+${p}`, `x+y+${s}`];
            } else {
                const s = rand(1,3); q = `(x+${s})^2 - (x+${s})(x-${s})`; a = `${s*2}x+${s*s*2}`;
                choices = [a, `${s*2}x`, `2x^2+${s*2}x`, `${s*s*2}` ];
            }
        }
        else if (modeToUse === 'factor_std') {
            const sub = Math.floor(Math.random() * 2);
            if (sub === 0) {
                const c = rand(2, 5); q = `${c}x^2 + ${c*rand(1, 4)}x`; a = `${c}x(x+${q.split('+')[1].replace('x','')/c})`;
            } else {
                const s = n1+n2, p = n1*n2; q = `x^2${s>0?'+':''}${s}x${p>0?'+':''}${p}`;
                a = (n1 === n2) ? `(x${n1>0?'+':''}${n1})^2` : (n1 === -n2) ? `(x+${Math.abs(n1)})(x-${Math.abs(n1)})` : `(x${n1>0?'+':''}${n1})(x${n2>0?'+':''}${n2})`;
            }
            choices = [a, `(x-${n1})(x-${n2})`, `x(x+${n1+n2})+${n1*n2}`, `(x+${n1*n2})(x+1)` ];
        }
        else if (modeToUse === 'factor_adv' || modeToUse === 'review_mode') {
            const type = Math.floor(Math.random() * 3);
            if (type === 0) { // 2項: 共通因数 -> 和と差
                const c = rand(2,3); const sq = [1, 4, 9][rand(0,2)];
                q = `${c}x^2 - ${c*sq}`; a = `${c}(x+${Math.sqrt(sq)})(x-${Math.sqrt(sq)})`;
                choices = [a, `${c}(x^2-${sq})`, `${c}(x-${sq})^2`, `(x+${sq})(x-${sq})` ];
            } else if (type === 1) { // 4項: グループ化
                const c1 = 'a', c2 = 'b';
                q = `x${c1} ${n1>0?'+':''}${n1}${c1} + x${c2} ${n1>0?'+':''}${n1}${c2}`;
                a = `(x${n1>0?'+':''}${n1})(${c1}+${c2})`;
                choices = [a, `(x+${c1})(x+${c2})`, `${c1}${c2}(x+${n1})`, `x(${c1}+${c2})+${n1}`];
            } else { // 3項+1項
                q = `x^2 ${n1*2>0?'+':''}${n1*2}x + ${n1*n1} - y^2`;
                a = `(x${n1>0?'+':''}${n1}+y)(x${n1>0?'+':''}${n1}-y)`;
                choices = [a, `(x${n1>0?'+':''}${n1}+y)^2`, `x^2-(y+${n1})^2`, `(x+y+${n1*n1})(x-y)` ];
            }
        }

        if (currentMode === 'review_mode') {
            let p = reviewList[reviewIndex];
            setupProblemUI(p.q, p.a, p.choices, "復習");
        } else {
            setupProblemUI(q, a, choices, modeToUse);
        }
    }

    function setupProblemUI(q, a, choices, badge) {
        currentAnswer = a; document.getElementById('question').innerHTML = formatMath(q);
        document.getElementById('mode-badge').innerText = badge;
        const container = document.getElementById('choices'); container.innerHTML = "";
        [...new Set(choices)].sort(() => Math.random() - 0.5).forEach(c => {
            const btn = document.createElement('button'); btn.className = "choice-btn math-text";
            btn.innerHTML = formatMath(c); btn.onclick = () => check(btn, c, {q, a, choices});
            container.appendChild(btn);
        });
    }

    function check(btn, val, probData) {
        const btns = document.querySelectorAll('.choice-btn'); btns.forEach(b => b.disabled = true);
        if (val === currentAnswer) {
            btn.classList.add('correct');
            if (isTestMode) { testCorrect++; testCount++; } 
            else if (currentMode === 'review_mode') { reviewList.splice(reviewIndex, 1); } 
            else { combo++; }
        } else {
            btn.classList.add('wrong');
            if (!reviewList.some(p => p.q === probData.q)) reviewList.push(probData);
            if (isTestMode) { testCount++; } 
            else if (currentMode === 'review_mode') { reviewIndex++; } 
            else { combo = 0; }
            btns.forEach(b => { if(b.innerHTML === formatMath(currentAnswer)) b.classList.add('correct'); });
        }
        updateUI();
        if (isTestMode && testCount >= goal) { setTimeout(showTestResult, 1000); }
        else if (!isTestMode && combo >= goal) { setTimeout(() => showScreen('clear-screen'), 1000); }
        else { setTimeout(generateProblem, 1000); }
    }

    function updateUI() {
        const bar = document.getElementById('combo-bar'), text = document.getElementById('combo-text');
        if (isTestMode) { bar.style.width = (testCount / goal * 100) + "%"; text.innerText = `進捗: ${testCount} / ${goal}`; } 
        else if (currentMode === 'review_mode') { bar.style.width = "100%"; text.innerText = `残り復習: ${reviewList.length}問`; } 
        else { bar.style.width = (combo / goal * 100) + "%"; text.innerText = `${combo} / ${goal}`; }
    }

    function showTestResult() {
        const score = (testCorrect / goal) * 100;
        document.getElementById('clear-title').innerText = "テスト終了！";
        document.getElementById('score-area').style.display = "block";
        document.getElementById('final-score').innerText = score;
        
        let eval = "";
        if (score === 100) { eval = "完璧です！この単元はもう敵なしですね。"; document.getElementById('clear-icon').innerText = "👑"; }
        else if (score >= 80) { eval = "素晴らしい！あと少しで満点です。"; document.getElementById('clear-icon').innerText = "✨"; }
        else if (score >= 60) { eval = "合格点です。間違えたところを復習しましょう。"; document.getElementById('clear-icon').innerText = "👍"; }
        else { eval = "まずは標準問題を完璧にするところから始めよう！"; document.getElementById('clear-icon').innerText = "📝"; }
        
        document.getElementById('eval-text').innerText = eval;
        document.getElementById('clear-msg').innerText = `正解数: ${testCorrect} / ${goal}`;
        showScreen('clear-screen');
    }
</script>
</body>
</html>
