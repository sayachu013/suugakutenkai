<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学サバイバル：中学3年・最終安定版</title>
    <style>
        :root {
            --primary: #4a90e2; --secondary: #9b59b6; --success: #2ecc71;
            --error: #e74c3c; --bg: #f5f7fa; --dark: #34495e;
            --review: #ff7675; --adv-color: #ff9f43; --test: #1abc9c;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-height: 600px; display: flex; flex-direction: column; }
        .screen { display: none; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }
        .home-title { text-align: center; color: var(--dark); margin-bottom: 20px; }
        .system-guide { background: #fff9e6; border: 1px solid #ffeaa7; border-radius: 12px; padding: 10px; margin-bottom: 20px; font-size: 0.8rem; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .mode-btn { padding: 15px 8px; border: none; border-radius: 12px; cursor: pointer; color: white; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .mode-btn h3 { margin: 0; font-size: 0.9rem; }
        .mode-btn p { margin: 4px 0 0; font-size: 0.65rem; opacity: 0.9; }
        .btn-std { background: var(--primary); } .btn-adv { background: var(--adv-color); }
        .btn-factor { background: var(--secondary); } .btn-factor-adv { background: #555; }
        .btn-test { background: var(--test); grid-column: span 2; height: 60px; margin-top: 5px; }
        .review-section { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .btn-review { background: var(--review); width: 100%; height: 50px; border-radius: 12px; color: white; border: none; cursor: pointer; font-weight: bold; display: none; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-home { background: #eee; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; }
        .combo-container { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        #combo-bar { width: 0%; height: 100%; background: var(--success); transition: width 0.3s; }
        .combo-text { font-weight: bold; color: var(--success); text-align: center; margin: 5px 0; font-size: 0.85rem; }
        .problem-card { background: #fff; border: 3px solid #f0f4f8; border-radius: 15px; padding: 40px 10px; text-align: center; margin-bottom: 20px; min-height: 160px; display: flex; align-items: center; justify-content: center; position: relative; }
        .question { font-size: 1.3rem; font-weight: bold; }
        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .choice-btn { padding: 10px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; font-size: 0.85rem; cursor: pointer; min-height: 80px; font-weight: bold; }
        .choice-btn.correct { background: var(--success) !important; color: white; }
        .choice-btn.wrong { background: var(--error) !important; color: white; }
        .math-text { font-family: "Times New Roman", Times, serif; font-style: italic; }
        .frac { display: inline-flex; flex-direction: column; vertical-align: middle; text-align: center; font-size: 0.85em; margin: 0 2px; }
        .frac .num { border-bottom: 1px solid currentColor; padding: 0 2px; line-height: 1.1; }
        .frac .den { padding: 0 2px; line-height: 1.1; }
        sup { font-style: normal; font-size: 0.7em; vertical-align: super; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen" class="screen active">
        <div class="home-title"><h1>数学サバイバル</h1><p>中学3年 展開・因数分解</p></div>
        <div class="system-guide">
            <p style="margin: 5px 10px;">• <strong>10問連続正解</strong>でクリア！<br>• ミスした問題は「復習モード」へ保存されます。</p>
        </div>
        <div class="grid-menu">
            <button class="mode-btn btn-std" onclick="startGame('expand_std')"><h3>展開：標準</h3><p>基本公式</p></button>
            <button class="mode-btn btn-adv" onclick="startGame('expand_adv')"><h3>展開：応用</h3><p>置換・分数</p></button>
            <button class="mode-btn btn-factor" onclick="startGame('factor_std')"><h3>因数分解：標準</h3><p>基本公式</p></button>
            <button class="mode-btn btn-factor btn-factor-adv" onclick="startGame('factor_adv')"><h3>因数分解：応用</h3><p>共通因数＋公式</p></button>
            <button class="mode-btn btn-test" onclick="startTest()"><h3>🏁 最終テスト (20問)</h3><p>全範囲ランダム</p></button>
        </div>
        <div class="review-section"><button id="review-btn" class="btn-review" onclick="startGame('review_mode')">🔥 復習モード (<span id="review-count">0</span>問)</button></div>
    </div>

    <div id="game-screen" class="screen">
        <div class="top-nav"><button class="back-home" onclick="goHome()">◀ ホーム</button><div id="diff-label" style="font-size:0.7rem; font-weight:bold; color:#888;"></div></div>
        <div class="progress-area"><div class="combo-container"><div id="combo-bar"></div></div><div class="combo-text" id="combo-text">0 / 10</div></div>
        <div class="problem-card"><div id="question" class="question math-text"></div></div>
        <div id="choices" class="choices-grid"></div>
    </div>

    <div id="clear-screen" class="screen" style="text-align:center; padding-top:40px;">
        <div style="font-size:3rem">🏆</div>
        <h2 id="clear-title">FINISH!</h2>
        <div id="score-area" style="display:none;">
            <div style="font-size:3rem; font-weight:bold; color:var(--test); margin: 10px 0;"><span id="final-score">0</span>点</div>
            <p id="eval-text"></p>
        </div>
        <button class="mode-btn btn-std" onclick="goHome()" style="margin-top:20px; width:100%;">ホームへ戻る</button>
    </div>
</div>

<script>
    let combo = 0, goal = 10, currentAnswerNorm = "", currentMode = "", reviewList = [], history = [];
    let isTest = false, testCount = 0, testCorrect = 0, testQueue = [];

    const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
    const reduce = (n, d) => { let common = Math.abs(gcd(n, d)); return [n/common, d/common]; };
    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    function formatMath(t) {
        if(!t) return "";
        return t.toString().replace(/\^2/g, '<sup>2</sup>').replace(/\b1([a-z\(y])/g, '$1').replace(/\b-1([a-z\(y])/g, '-$1').replace(/(\d+)\/(\d+)/g, '<span class="frac"><span class="num">$1</span><span class="den">$2</span></span>').replace(/\+-/g, '-').replace(/--/g, '+');
    }

    function normalize(s) {
        if (!s) return "";
        let res = s.toString().replace(/\s/g, '').replace(/<sup>2<\/sup>/g, '^2');
        if (res.includes(')(')) return res.split(')(').map(p => p.replace(/[\(\)]/g, '')).sort().join(')(');
        return res;
    }

    function startGame(m) {
        isTest = false; currentMode = m; combo = 0; goal = 10;
        document.getElementById('score-area').style.display = "none";
        document.getElementById('clear-title').innerText = "サバイバル成功！";
        showScreen('game-screen'); updateUI(); generateProblem();
    }

    function startTest() {
        isTest = true; testCount = 0; testCorrect = 0; goal = 20;
        document.getElementById('score-area').style.display = "none";
        document.getElementById('clear-title').innerText = "テスト完了！";
        testQueue = [];
        ['expand_std', 'expand_adv', 'factor_std', 'factor_adv'].forEach(m => { for(let i=0; i<5; i++) testQueue.push(m); });
        testQueue.sort(() => Math.random() - 0.5);
        showScreen('game-screen'); updateUI(); generateProblem();
    }

    function goHome() { showScreen('home-screen'); updateReviewButton(); }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function updateReviewButton() {
        const btn = document.getElementById('review-btn');
        btn.style.display = reviewList.length > 0 ? 'block' : 'none';
        document.getElementById('review-count').innerText = reviewList.length;
    }

    function generateProblem() {
        // 終了判定を最優先
        if (isTest && testCount >= goal) { showResult(); return; }
        if (!isTest && currentMode !== 'review_mode' && combo >= goal) { showResult(); return; }
        if (currentMode === 'review_mode' && reviewList.length === 0) { goHome(); return; }

        let m = isTest ? testQueue[testCount] : currentMode;
        if (currentMode === 'review_mode') {
            let p = reviewList[0]; setupUI(p.q, p.a, p.choices); return;
        }

        let res, attempts = 0;
        // フリーズ防止のため試行回数を制限
        while (attempts < 30) {
            res = buildProblemData(m);
            if (!history.includes(res.q)) break;
            attempts++;
        }
        history.push(res.q); if(history.length > 15) history.shift();
        setupUI(res.q, res.a, res.choices);
    }

    function buildProblemData(m) {
        let q, correct, wSet = new Set();
        if (m === 'expand_std') {
            let t = rand(0, 2);
            if (t === 0) {
                let n1 = rand(-6, 6), n2 = rand(-6, 6); if(n1===0) n1=1; if(n1===n2) n2++;
                q = `(x${n1>0?'+':''}${n1})(x${n2>0?'+':''}${n2})`;
                correct = `x^2${(n1+n2)>0?'+':''}${n1+n2===0?'':(n1+n2)+'x'}${n1*n2>0?'+':''}${n1*n2===0?'':n1*n2}`;
                wSet.add(`x^2+${n1*n2}`).add(`x^2+${n1+n2}x`).add(`x^2-${n1*n2}`);
            } else if (t === 1) {
                let n = rand(2, 9); q = `(x+${n})^2`;
                correct = `x^2+${2*n}x+${n*n}`;
                wSet.add(`x^2+${n*n}`).add(`x^2+${n}x+${n*n}`).add(`x^2+${2*n}x+${2*n}`);
            } else {
                let n = rand(2, 10); q = `(x+${n})(x-${n})`;
                correct = `x^2-${n*n}`;
                wSet.add(`x^2+${n*n}`).add(`x^2-${n}`).add(`x^2-${2*n}`);
            }
        } else if (m === 'expand_adv') {
            if (Math.random() > 0.5) {
                let n = rand(2, 5); q = `(x+y+${n})(x+y-${n})`;
                correct = `(x+y)^2-${n*n}`;
                wSet.add(`(x+y)^2+${n*n}`).add(`x^2+y^2-${n*n}`).add(`(x+y+${n})^2`);
            } else {
                let d = [2, 4, 5][rand(0, 2)];
                let [rn, rd] = reduce(2, d), [sn, sd] = reduce(1, d*d);
                q = `(x+1/${d})^2`;
                correct = `x^2+${rn}/${rd}x+${sn}/${sd}`;
                wSet.add(`x^2+1/${d}x+${sn}/${sd}`).add(`x^2+${rn}/${rd}x+1/${d}`).add(`x^2+${sn}/${sd}`);
            }
        } else if (m === 'factor_std') {
            let n1 = rand(-6, 6), n2 = rand(-6, 6); if(n1===0) n1=1; if(n2===0) n2=-1;
            q = `x^2${(n1+n2)>0?'+':''}${n1+n2===0?'':(n1+n2)+'x'}${n1*n2>0?'+':''}${n1*n2===0?'':n1*n2}`;
            correct = (n1===n2) ? `(x${n1>0?'+':''}${n1})^2` : `(x${n1>0?'+':''}${n1})(x${n2>0?'+':''}${n2})`;
            wSet.add(`(x-${n1})(x-${n2})`).add(`(x+${n1*n2})(x+1)`).add(`x(x+${n1+n2})`);
        } else {
            let t = rand(0, 1);
            if (t === 0) {
                let k = rand(2, 3), n = [4, 9, 16][rand(0, 2)];
                let sq = Math.sqrt(n); q = `${k}x^2-${k*n}`;
                correct = `${k}(x+${sq})(x-${sq})`;
                wSet.add(`${k}(x^2-${n})`).add(`${k}(x-${sq})^2`).add(`(x+${sq})(x-${sq})`);
            } else {
                let n = [4, 9, 16][rand(0, 2)], sq = Math.sqrt(n);
                q = `(x+y)^2-${n}`;
                correct = `(x+y+${sq})(x+y-${sq})`;
                wSet.add(`(x+y-${sq})^2`).add(`(x+y+${n})(x+y-1)`).add(`(x-y+${sq})(x-y-${sq})`);
            }
        }

        let choices = [correct];
        let nSet = new Set([normalize(correct)]);
        for (let w of wSet) {
            if (!nSet.has(normalize(w))) { nSet.add(normalize(w)); choices.push(w); }
        }
        const back = ["(x+1)(x-1)", "x^2+1", "x(x+1)", "(x+1)^2"];
        for (let b of back) {
            if (choices.length >= 4) break;
            if (!nSet.has(normalize(b))) { nSet.add(normalize(b)); choices.push(b); }
        }
        return { q, a: correct, choices: choices.slice(0, 4) };
    }

    function setupUI(q, a, ch) {
        currentAnswerNorm = normalize(a);
        document.getElementById('question').innerHTML = formatMath(q);
        const container = document.getElementById('choices');
        container.innerHTML = "";
        ch.sort(() => Math.random() - 0.5).forEach(val => {
            const btn = document.createElement('button');
            btn.className = "choice-btn math-text";
            btn.innerHTML = formatMath(val);
            btn.onclick = () => {
                const btns = document.querySelectorAll('.choice-btn');
                btns.forEach(b => b.disabled = true);
                let isCorrect = (normalize(val) === currentAnswerNorm);
                
                if (isCorrect) {
                    btn.classList.add('correct');
                    if (isTest) { testCorrect++; testCount++; }
                    else if (currentMode === 'review_mode') { reviewList.shift(); }
                    else { combo++; }
                } else {
                    btn.classList.add('wrong');
                    if (!reviewList.some(p => p.q === q)) reviewList.push({q, a, choices:ch});
                    if (isTest) testCount++;
                    else if (currentMode === 'review_mode') { reviewList.push(reviewList.shift()); }
                    else { combo = 0; }
                    btns.forEach(b => { if(normalize(b.innerHTML) === currentAnswerNorm) b.classList.add('correct'); });
                }
                updateUI();
                setTimeout(generateProblem, 800);
            };
            container.appendChild(btn);
        });
    }

    function updateUI() {
        const bar = document.getElementById('combo-bar'), text = document.getElementById('combo-text');
        if (isTest) { bar.style.width = (testCount / goal * 100) + "%"; text.innerText = `テスト: ${testCount} / ${goal}`; } 
        else if (currentMode === 'review_mode') { bar.style.width = "100%"; text.innerText = `残り復習: ${reviewList.length}問`; } 
        else { bar.style.width = (combo / goal * 100) + "%"; text.innerText = `${combo} / ${goal}`; }
    }

    function showResult() {
        const s = isTest ? Math.round((testCorrect / goal) * 100) : 100;
        document.getElementById('score-area').style.display = isTest ? "block" : "none";
        document.getElementById('final-score').innerText = s;
        document.getElementById('eval-text').innerText = s === 100 ? "完璧です！" : "お疲れ様でした！";
        showScreen('clear-screen');
    }
</script>
</body>
</html>
